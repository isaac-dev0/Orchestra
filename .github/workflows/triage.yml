name: triage

on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to its author and apply triage label
        uses: actions/github-script@v8
        with:
          script: |
            const author = context.payload.issue.user.login;
            const issue_number = context.payload.issue.number;
            const { owner, repo } = context.repo;

            await github.rest.issues.addAssignees({
              owner, repo, issue_number,
              assignees: [author],
            });

            const existing = (context.payload.issue.labels || []).map(l => l.name);
            if (!existing.includes('status: triage')) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number,
                labels: ['status: triage'],
              });
            }

  assign-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR to its author
        uses: actions/github-script@v8
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const current = (context.payload.pull_request.assignees || []).map(a => a.login);
            if (current.includes(author)) return;

            await github.rest.issues.addAssignees({
              owner, repo, issue_number,
              assignees: [author],
            });
